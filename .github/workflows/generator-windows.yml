name: Generator Windows Skeleton
run-name: Generator Windows Skeleton

on:
  workflow_dispatch:
    inputs:
      version:
        description: RustDesk source tag or branch
        required: true
        default: master
        type: string
      zip_url_json:
        description: Encrypted generator secrets zip descriptor JSON
        required: true
        type: string

env:
  GENERATOR_SKELETON_ONLY: 'true'

jobs:
  fetch-secrets:
    uses: ./.github/workflows/fetch-generator-secrets.yml
    with:
      zip_url_json: ${{ inputs.zip_url_json }}

  generator-windows:
    name: Generator Windows Skeleton
    needs: fetch-secrets
    runs-on: windows-2022
    steps:
      - name: Checkout generator controller repo
        uses: actions/checkout@v4
        with:
          path: controller

      - name: Download encrypted generator secrets
        uses: actions/download-artifact@v4
        with:
          name: encrypted-generator-secrets-zip
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install generator Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyzipper

      - name: Decrypt generator secrets
        shell: bash
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          python controller/generator/scripts/decrypt_generator_secrets.py \
            --zip-path secrets.zip \
            --password "$ZIP_PASSWORD" \
            --dump-json-path controller/generator/runtime/decrypted-secrets.json

      - name: Report status 5%
        shell: bash
        run: |
          python controller/generator/scripts/report_job_status.py \
            --status queued \
            --progress 5 \
            --message "生成任务已进入 Windows skeleton workflow" \
            --soft-fail

      - name: Checkout upstream RustDesk source
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          ref: ${{ env.version }}
          path: source
          submodules: recursive

      - name: Resolve generator modules
        shell: bash
        run: |
          python controller/generator/scripts/resolve_generator_modules.py \
            --index controller/generator/modules/module-index.json \
            --platform windows \
            --output controller/generator/runtime/resolved-modules.json

      - name: Report status 20%
        shell: bash
        run: |
          python controller/generator/scripts/report_job_status.py \
            --status running \
            --progress 20 \
            --stage module_resolved \
            --message "模块清单校验完成，已准备生成 custom 配置" \
            --soft-fail

      - name: Materialize rdgen custom payload
        shell: bash
        run: |
          python controller/generator/scripts/materialize_custom_payload.py \
            --output source/custom_.txt

      - name: Build generator request snapshot
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          out = Path('controller/generator/output')
          out.mkdir(parents=True, exist_ok=True)
          snapshot = {
              'job_id': os.environ.get('job_id', ''),
              'version': os.environ.get('version', ''),
              'platform': os.environ.get('platform', 'windows'),
              'server': os.environ.get('server', ''),
              'key': os.environ.get('key', ''),
              'apiServer': os.environ.get('apiServer', ''),
              'appname': os.environ.get('appname', ''),
              'filename': os.environ.get('filename', ''),
              'selected_modules': os.environ.get('GENERATOR_MODULE_KEYS', ''),
              'skeleton_only': True,
              'notes': [
                  'This workflow currently validates the generator payload and module metadata.',
                  'Accepted client modules still need dedicated patch/script bundles before real build output is enabled.'
              ],
          }
          Path('controller/generator/output/generator-request.json').write_text(
              json.dumps(snapshot, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )

      - name: Upload generator request artifact
        uses: actions/upload-artifact@v4
        with:
          name: generator-request-windows
          path: |
            controller/generator/output/generator-request.json
            controller/generator/runtime/decrypted-secrets.json
            controller/generator/runtime/resolved-modules.json
            source/custom_.txt
          retention-days: 7

      - name: Upload generator request callback
        shell: bash
        run: |
          python controller/generator/scripts/upload_artifact_callback.py \
            --file controller/generator/output/generator-request.json \
            --display-label "generator-request-windows" \
            --soft-fail

      - name: Report status 100%
        shell: bash
        run: |
          python controller/generator/scripts/report_job_status.py \
            --status skeleton_complete \
            --progress 100 \
            --stage skeleton_complete \
            --message "Windows generator workflow skeleton 已完成：协议校验、模块解析、custom 配置落盘成功，真实构建步骤待接入" \
            --soft-fail
