name: Fetch Generator Secrets

on:
  workflow_call:
    inputs:
      zip_url_json:
        required: true
        type: string

jobs:
  download-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Download encrypted generator secrets zip
        shell: python
        run: |
          import json
          import time
          from pathlib import Path
          from urllib import request

          payload = json.loads('''${{ inputs.zip_url_json }}''')
          url = payload['url']
          task_uuid = payload['file']
          token = payload.get('token', '')
          query = f"?token={token}" if token else ''
          download_url = f"{url}/api/client_generator/job/secret_zip/{task_uuid}{query}"
          out = Path('secrets.zip')

          last_error = None
          for attempt in range(1, 6):
              try:
                  print(f"Downloading encrypted generator secrets (attempt {attempt}) from {download_url}")
                  with request.urlopen(download_url, timeout=30) as resp:
                      out.write_bytes(resp.read())
                  break
              except Exception as exc:
                  last_error = exc
                  if attempt == 5:
                      raise
                  time.sleep(2 ** attempt)

          print(f"Downloaded {out} ({out.stat().st_size} bytes)")
      - name: Upload encrypted secrets artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-generator-secrets-zip
          path: secrets.zip
          retention-days: 1
